<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="static/login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body id="corpo">
    <div id="quadrado"></div>
    <img id="cara" src="static/cara.png">
    <img id="ceara" src="static/senaiceara.png">
    {% for categoria, mensagem in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ categoria }}">{{ mensagem }}</div>
    {% endfor %}
    <form method="POST">
        <div id="email" class="form-floating mb-3">
            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
            <label>Endereço de Email</label>
        </div>
        <div id="senha" class="form-floating">
            <input type="password" name="senha" class="form-control" placeholder="Password" required>
            <label>Senha</label>
        </div>
        <br>
        <button id="entrar" class="btn btn-primary" type="submit">Entrar</button>
        <button id="esquece" type="button" class="btn btn-link">
            Esqueci a Senha
        </button>
    </form>
</body>
</body>
</html>
