<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/static/cadastro.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/tbladd">Adicionar Itens</a></li>
                    <li class="nav-item"><a class="nav-link" href="/tblvizu">Visualizar Itens</a></li>
                    <li class="nav-item"><a class="nav-link" href="/tblmove">Entrada e Saída</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/cadastroadm">Cadastrar Usuários</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h4>Cadastrar Usuário</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="/cadastroadm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="email@rogerlindo.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" name="senha" class="form-control" placeholder="Senha" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Permissão</label>
                        <select name="permissao" class="form-select" required>
                            <option value="user">Usuário</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-cadastrar w-100">Cadastrar</button>
                </form>
            </div>
        </div>
    </div>
    {% if get_flashed_messages() %}
        {% set msgs = get_flashed_messages(with_categories=true) %}
        <script>
            {% for categoria, mensagem in msgs %}
                Swal.fire({
                    icon: '{{ "success" if categoria == "success" else "error" }}',
                    title: '{{ mensagem }}',
                    confirmButtonColor: '#192A6B'
                });
            {% endfor %}
        </script>
    {% endif %}
</body>
</html>
